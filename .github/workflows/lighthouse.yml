name: Lighthouse CI

# Runs Lighthouse against the LIVE site (lab10yr.com). app-maps has no
# "Deploy Pages" workflow to chain from, so this runs on a weekly schedule
# plus manual dispatch. Form factor (desktop) + score thresholds live in
# .github/lighthouserc.json — desktop is representative of the B2B audience;
# the default mobile+4x-CPU+slow-4G throttle wildly inflated TBT/CLS on CI.

on:
  schedule:
    - cron: '30 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://lab10yr.com/
            https://lab10yr.com/soil-data-stories.html
            https://lab10yr.com/sql-runner.html
            https://lab10yr.com/worlds/conservation/
          configPath: .github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
